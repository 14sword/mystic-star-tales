    <script type="application/ld+json">

        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "神秘星语 | Mystic Star Tales",
        "description": "在星辰与神话之间，聆听来自世界各地的古老传说",
        "url": "./"

<body>
    <!-- 跳过导航链接（无障碍） -->
    <a href="#main-content" class="skip-link">跳转到主要内容</a>
    
    <!-- 星轨背景画布 -->
    <canvas id="starfield" aria-hidden="true"></canvas>

    <!-- 主内容区 -->
    <main class="main-container" id="main-content">
        <!-- 标题区 -->
        <header class="site-header">
            <h1 class="main-title">
                <span class="title-cn" data-i18n="appName">神秘星语</span>
                <span class="title-en">Mystic Star Tales</span>
            </h1>
            <p class="subtitle" data-i18n="appSubtitle">在星辰与神话之间，聆听古老的呢喃</p>
        </header>

        <!-- 卡片网格 -->
        <section class="cards-grid" id="cards-container" role="region" aria-label="神话故事列表">
            <!-- 卡片由JS动态生成 -->
        </section>
    </main>

    <!-- 故事详情模态框 -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-container">
            <button class="modal-close" id="modal-close" aria-label="关闭故事详情">&times;</button>
            <div class="modal-content">
                <div class="modal-media">
                    <div class="video-placeholder" id="video-placeholder">
                        <div class="placeholder-icon">&#10022;</div>
                        <p>AI视觉短片加载中</p>
                        <span class="placeholder-hint">离线图片短片 / 联网视频增强</span>
                    </div>
                </div>
                <div class="modal-text">
                    <h2 class="modal-title" id="modal-title"></h2>
                    <p class="modal-origin" id="modal-origin"></p>
                    <div class="modal-story" id="modal-story"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页面加载动画（最先加载） -->
    <script defer src="js/page-loader.js"></script>
    
    <!-- Core Data & Initialization -->
    <script src="assets/generated/asset-manifest.js"></script>
    <script defer src="js/cards-data.js?v=ai-intro-4"></script>
    <script defer src="js/app-config.js"></script>
    <script defer src="js/app-event-bus.js"></script>
    <script defer src="js/storage-migration.js"></script>
    
    <!-- 首屏核心脚本：其余增强模块由 deferred-loader 在空闲期分批加载 -->
    <script defer src="js/asset-service.js?v=ai-intro-4"></script>
    
    <!-- 核心业务逻辑 -->
    <script defer src="js/cards-render-optimized.js?v=ai-intro-4"></script>
    <script defer src="js/modal-optimized.js?v=ai-intro-4"></script>
    <script defer src="js/image-loader.js?v=ai-intro-4"></script>
    <script defer src="js/starfield-optimized.js"></script>
    <script defer src="js/cursor-light.js"></script>
    <script defer src="js/effects.js"></script>
    <script defer src="js/main-optimized.js"></script>
    <script defer src="js/deferred-loader.js"></script>
    
    <!-- Service Worker -->
    <script>
        if (location.protocol === 'http:' || location.protocol === 'https:') {
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = 'manifest.json';
            document.head.appendChild(manifestLink);
        }

        if ('serviceWorker' in navigator && (location.protocol === 'http:' || location.protocol === 'https:')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: './' })
                    .catch(() => {});
            });
        }
    </script>
</body>
</html>
